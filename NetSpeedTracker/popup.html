<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>NetSpeedTracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 200px;
  background: #0f0f14;
  font-family: 'SF Mono','JetBrains Mono','Fira Code',monospace;
  color: #e2e2e2;
}
.header {
  display: flex; align-items: center; gap: 7px;
  padding: 12px 14px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.bars { display:flex; align-items:flex-end; gap:2px; height:14px; }
.bars span { display:block; width:3px; border-radius:1px; background:#8b5cf6; }
.bars span:nth-child(1){height:5px;opacity:.45;}
.bars span:nth-child(2){height:9px;opacity:.7;}
.bars span:nth-child(3){height:13px;}
.brand { font-size:10px; font-weight:700; letter-spacing:.1em; color:rgba(139,92,246,.85); text-transform:uppercase; }
.pulse { width:7px;height:7px;border-radius:50%;background:#8b5cf6;box-shadow:0 0 6px #8b5cf6;margin-left:auto;animation:blink 2s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.speed-block { padding: 14px 14px 10px; }
.speed-num { font-size:36px; font-weight:700; color:#a78bfa; letter-spacing:-0.02em; line-height:1; }
.speed-unit { font-size:10px; color:rgba(255,255,255,.35); letter-spacing:.08em; margin-top:3px; }
.quality { font-size:10px; font-weight:600; color:#8b5cf6; margin-top:6px; letter-spacing:.04em; }

.stats { border-top:1px solid rgba(255,255,255,.06); }
.stat-row {
  display:flex; justify-content:space-between; align-items:center;
  padding: 7px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.stat-label { font-size:8px; color:rgba(255,255,255,.3); letter-spacing:.1em; text-transform:uppercase; }
.stat-value { font-size:11px; font-weight:600; color:#c4b5fd; }

.actions { padding:10px 14px 12px; }
button {
  width:100%; padding:7px;
  background:rgba(139,92,246,.12);
  border:1px solid rgba(139,92,246,.3);
  border-radius:8px;
  color:#a78bfa; font-family:inherit; font-size:10px;
  font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  cursor:pointer; transition:all .15s;
}
button:hover { background:rgba(139,92,246,.22); }
button.off { background:rgba(248,113,113,.08); border-color:rgba(248,113,113,.25); color:#f87171; }
button.off:hover { background:rgba(248,113,113,.16); }
</style>
</head>
<body>
<div class="header">
  <div class="bars"><span></span><span></span><span></span></div>
  <span class="brand">NetSpeed</span>
  <div class="pulse" id="pulse"></div>
</div>
<div class="speed-block">
  <div class="speed-num" id="p-speed">—</div>
  <div class="speed-unit" id="p-unit">Mbps</div>
  <div class="quality" id="p-quality">Connecting…</div>
</div>
<div class="stats">
  <div class="stat-row">
    <span class="stat-label">Ping</span>
    <span class="stat-value" id="p-ping">— ms</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Peak</span>
    <span class="stat-value" id="p-peak">— Mbps</span>
  </div>
</div>
<div class="actions">
  <button id="p-btn">Stop Tracker</button>
</div>
<script src="popup.js"></script>
</body>
</html>
